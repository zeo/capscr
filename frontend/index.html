<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>capscr</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <style>
      /* shown only before solid mounts; replaced by the real app shell.
         pure CSS so it animates before any JS loads. monochrome to match the
         terminal/instrument aesthetic; literal hex so it can't render colorless
         if the stylesheet's custom properties haven't parsed yet. */
      html,
      body {
        background: #141414;
      }
      #boot {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: "Fira Code", ui-monospace, Consolas, monospace;
        font-size: 11px;
        color: #6f6f6f;
        background: #141414;
        letter-spacing: 0.06em;
      }
      #boot .boot-line {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      #boot .boot-mark {
        width: 8px;
        height: 8px;
        background: #f5f5f5;
        animation: boot-pulse 1.1s steps(2, end) infinite;
      }
      #boot .boot-caret {
        width: 7px;
        height: 12px;
        background: #6f6f6f;
        animation: boot-blink 800ms steps(2, end) infinite;
      }
      @keyframes boot-pulse {
        to {
          opacity: 0.25;
        }
      }
      @keyframes boot-blink {
        to {
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .boot-mark,
        #boot .boot-caret {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <span class="boot-line">
        <span class="boot-mark"></span>
        capscr/console
        <span class="boot-caret"></span>
      </span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
