name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm install --prefix frontend

      - name: Build frontend
        run: npm run --prefix frontend build

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build with tauri-cli (MSI + NSIS + portable exe)
        run: cargo tauri build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: capscr-windows-x64-msi
          path: target/release/bundle/msi/*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: capscr-windows-x64-nsis
          path: target/release/bundle/nsis/*.exe

      - name: Create portable ZIP
        run: |
          mkdir dist
          cp target/release/capscr.exe dist/
          cp LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath capscr-windows-x64-portable.zip
        shell: pwsh

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: capscr-windows-x64-portable
          path: capscr-windows-x64-portable.zip

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
            **/*.msi
            **/*.exe
          generate_release_notes: true
