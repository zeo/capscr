name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # bypass the runner's machine-level sccache wrapper, whose server drops
  # connections mid-build; Swatinem/rust-cache still caches deps between runs
  RUSTC_WRAPPER: ""

jobs:
  build-windows:
    if: github.actor == 'lintowe'
    runs-on: [self-hosted, windows-vm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for tag
        id: changelog
        shell: powershell
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          $pattern = '^##\s+\[' + [regex]::Escape($version) + '\]'
          $lines = Get-Content -LiteralPath 'CHANGELOG.md'
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $pattern) { $start = $i; break }
          }
          $collected = New-Object System.Collections.Generic.List[string]
          if ($start -ge 0) {
            for ($j = $start + 1; $j -lt $lines.Count; $j++) {
              if ($lines[$j] -match '^##\s+\[') { break }
              $collected.Add($lines[$j])
            }
          }
          $body = ($collected -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($body)) { $body = "capscr $version" }
          $delim = 'CHANGELOG_EOF_' + [System.Guid]::NewGuid().ToString('N')
          $payload = "notes<<$delim`n$body`n$delim`n"
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, $payload, (New-Object System.Text.UTF8Encoding $false))

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build and release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'capscr ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # the branded first-install experience: a native window wrapped around the
      # very MSI tauri just built (and signed), so the in-app updater's chain is
      # untouched. signed with the same cert, attached beside the MSI
      - name: Build capscr-setup (native installer)
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $ver = $env:TAG_NAME -replace '^v',''
          $msi = Get-ChildItem target\release\bundle\msi\*.msi | Select-Object -First 1
          if (-not $msi) { throw "no MSI found under target\release\bundle\msi" }
          $env:CAPSCR_MSI_PATH = $msi.FullName
          $env:CAPSCR_APP_VERSION = $ver
          cargo build --release --manifest-path setup/Cargo.toml
          if ($LASTEXITCODE -ne 0) { throw "setup build failed" }
          $out = "capscr-$ver-setup.exe"
          Copy-Item setup\target\release\capscr-setup.exe $out
          # sign with the machine cert tauri already uses; warn-only if signtool
          # is missing so the release still completes
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1
          if ($signtool) {
            & $signtool.FullName sign /sha1 6EC3EDE3956F6F4B7423C723397AF66BC9D596BA /fd sha256 /tr http://timestamp.digicert.com /td sha256 $out
            if ($LASTEXITCODE -ne 0) { Write-Warning "signing failed; uploading unsigned" }
          } else {
            Write-Warning "signtool not found; uploading unsigned"
          }
          # gh isn't on this self-hosted runner's PATH; upload the installer to
          # the release tauri-action already created, via the REST API with the
          # workflow token. clobber any prior asset of the same name.
          $name = Split-Path $out -Leaf
          $repo = $env:GITHUB_REPOSITORY
          $headers = @{
            Authorization          = "Bearer $env:GITHUB_TOKEN"
            Accept                 = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $rel = Invoke-RestMethod -Headers $headers "https://api.github.com/repos/$repo/releases/tags/$env:TAG_NAME"
          foreach ($asset in @($rel.assets | Where-Object { $_.name -eq $name })) {
            Invoke-RestMethod -Method Delete -Headers $headers "https://api.github.com/repos/$repo/releases/assets/$($asset.id)"
          }
          $uploadUrl = ($rel.upload_url -replace '\{.*\}$', '') + "?name=$name"
          $uploadHeaders = $headers.Clone()
          $uploadHeaders["Content-Type"] = "application/octet-stream"
          Invoke-RestMethod -Method Post -Headers $uploadHeaders -InFile $out $uploadUrl | Out-Null

  # linux bundles (deb / rpm / AppImage) on a hosted runner. ubuntu-24.04 is
  # the oldest image whose pipewire headers libspa 0.9 compiles against, which
  # puts the AppImage glibc floor at 2.39 (Ubuntu 24.04 / Debian 13 / Fedora 40
  # or newer). runs after the windows job so the two tauri-action invocations
  # update the release (and merge latest.json) sequentially instead of racing
  # to create it.
  build-linux:
    if: github.actor == 'lintowe'
    needs: build-windows
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for tag
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          body="$(awk -v ver="$version" '
            $0 ~ "^##[[:space:]]+\\[" ver "\\]" { found=1; next }
            found && /^##[[:space:]]+\[/ { exit }
            found { print }
          ' CHANGELOG.md)"
          if [ -z "$(printf %s "$body" | tr -d '[:space:]')" ]; then body="capscr $version"; fi
          delim="CHANGELOG_EOF_$(od -An -N16 -tx1 /dev/urandom | tr -d ' \n')"
          { echo "notes<<$delim"; printf '%s\n' "$body"; echo "$delim"; } >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file pkg-config \
            libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            libclang-dev libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev \
            libxrandr-dev libdbus-1-dev libpipewire-0.3-dev \
            libwayland-dev libegl-dev libgbm-dev libdrm-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build and release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'capscr ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
